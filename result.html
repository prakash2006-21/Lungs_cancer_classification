<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prediction Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #002d2d, #000);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }
    .card {
      background: rgba(0, 40, 40, 0.85);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
      text-align: center;
      border: 1px solid rgba(0, 255, 255, 0.3);
      width: 500px;
      animation: fadeIn 1s ease-in-out;
      position: relative;
      overflow: hidden;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #00e5ff;
      margin-bottom: 20px;
    }
    .scan-container {
      position: relative;
      display: inline-block;
      width: 100%;
    }
    img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid rgba(0, 255, 255, 0.5);
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      display: block;
    }
    /* CT scan sweeping glow beam */
    .scan-line {
      position: absolute;
      top: -15%;
      left: 0;
      height: 20%;
      width: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0, 255, 255, 0.2) 0%,
        rgba(0, 255, 255, 0.5) 50%,
        rgba(0, 255, 255, 0.2) 100%
      );
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.6), 0 0 40px rgba(0, 255, 255, 0.4);
      animation: sweep 3s infinite ease-in-out;
      border-radius: 8px;
    }
    @keyframes sweep {
      0% { top: -20%; }
      50% { top: 100%; }
      100% { top: 100%; }
    }
    .label {
      font-size: 1.2em;
      font-weight: bold;
      color: #00ffb0;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ffb0;
    }
    .confidence {
      font-size: 1em;
      color: #80deea;
      margin-bottom: 20px;
    }
    a {
      text-decoration: none;
      padding: 10px 15px;
      background: linear-gradient(90deg, #00e5ff, #00bfa5);
      color: #002d2d;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 0 10px #00e5ff;
      transition: all 0.3s ease;
    }
    a:hover {
      background: linear-gradient(90deg, #00bfa5, #00e5ff);
      box-shadow: 0 0 20px #00e5ff;
    }
    .icon {
      font-size: 3em;
      margin-bottom: 10px;
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🩻</div> <!-- X-ray icon -->
    <h1>Prediction Result</h1>
    <div class="scan-container">
      <img src="{{ image_path }}" alt="CT Scan" />
      <div class="scan-line"></div>
    </div>
    <div class="label">Class: {{ label }}</div>
    <div class="confidence">Confidence: {{ "%.2f" % confidence }}%</div>
    <a href="/">⬅ New Scan</a>
  </div>
</body>
</html>
