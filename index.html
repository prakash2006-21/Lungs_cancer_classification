<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CT Scan Lung Cancer Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #002d2d, #000);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }
    .container {
      background: rgba(0, 40, 40, 0.85);
      padding: 50px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid rgba(0, 255, 255, 0.3);
      width: 500px;
      animation: fadeIn 1s ease-in-out, pulse 3s infinite ease-in-out;
      position: relative;
      overflow: hidden;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #00e5ff;
      margin-bottom: 10px;
    }
    p {
      font-size: 1em;
      color: #80deea;
      margin-bottom: 30px;
    }
    .icon {
      font-size: 4em;
      margin-bottom: 15px;
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff;
      position: relative;
    }
    form {
      margin-top: 20px;
    }
    input[type="file"] {
      display: none;
    }
    label {
      background: linear-gradient(90deg, #00e5ff, #00bfa5);
      color: #002d2d;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 10px #00e5ff;
      transition: all 0.3s ease;
      display: inline-block;
    }
    label:hover {
      background: linear-gradient(90deg, #00bfa5, #00e5ff);
      box-shadow: 0 0 20px #00e5ff;
    }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00e5ff, #00bfa5);
      color: #002d2d;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px #00e5ff;
      transition: all 0.3s ease;
    }
    button:hover {
      background: linear-gradient(90deg, #00bfa5, #00e5ff);
      box-shadow: 0 0 20px #00e5ff;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
      }
      50% {
        box-shadow: 0 0 50px rgba(0, 255, 255, 0.8);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🩻</div>
    <h1>CT Scan Analysis</h1>
    <p>Upload a CT scan image to get a instant analysis.</p>
    <form action="/" method="POST" enctype="multipart/form-data">
      <input type="file" name="image" id="fileInput" required />
      <label for="fileInput">📂 Choose CT Scan</label>
      <br />
      <button type="submit">🔍 Analyze Scan</button>
    </form>
  </div>
</body>
</html>
